version: '3.8'

services:
  # 只保留后端服务
  backend:
    build: ./backend
    container_name: blog-api
    restart: always
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据库：宿主机 ./backend/database.db 挂载到容器中
      - ./backend/database.db:/app/database.db
    env_file:
      - ./backend/.env
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge
